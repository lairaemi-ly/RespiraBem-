<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orientação - RespiraBem</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <a href="sintomas.html" class="btn-voltar">
        <i class="fa-solid fa-arrow-left"></i>
        Voltar para triagem
    </a>

    <section id="resultado-card">

        <span class="badge">
            Resultado da Avaliação
        </span>

        <h1 id="titulo-resultado"></h1>

        <p id="texto-resultado"></p>

    </section>

    <section class="orientacao-card">

        <h2>
            <i class="fa-solid fa-circle-check"></i>
            O que fazer
        </h2>

        <ul id="lista-fazer"></ul>

    </section>

    <section class="orientacao-card">

        <h2>
            <i class="fa-solid fa-circle-xmark"></i>
            O que evitar
        </h2>

        <ul id="lista-evitar"></ul>

    </section>

    <section class="atendimento-card">

        <h2>
            <i class="fa-solid fa-triangle-exclamation"></i>
            Quando procurar atendimento médico
        </h2>

        <ul id="lista-atendimento"></ul>

    </section>

    <div id="botao-final"></div>

    <script src="script.js"></script>

</body>
</html>
